version: '3.8'

services:
  stock-mcp:
    image: ${ECR_REGISTRY}/stock-agent:mcp
    environment:
      - AWS_DEFAULT_REGION=ap-south-1
    networks:
      - stock-network

  stock-researcher:
    image: ${ECR_REGISTRY}/stock-agent:researcher
    environment:
      - AWS_DEFAULT_REGION=ap-south-1
      - MCP_URL=http://stock-mcp:8050/mcp
    depends_on:
      - stock-mcp
    networks:
      - stock-network

  stock-analyst:
    image: ${ECR_REGISTRY}/stock-agent:analyst
    environment:
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - stock-mcp
    networks:
      - stock-network

  stock-web:
    image: ${ECR_REGISTRY}/stock-agent:web
    environment:
      - AWS_DEFAULT_REGION=ap-south-1
      - RESEARCHER_URL=http://stock-researcher:8001
      - ANALYST_URL=http://stock-analyst:8002
    depends_on:
      - stock-researcher
      - stock-analyst
    networks:
      - stock-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - stock-web
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge
