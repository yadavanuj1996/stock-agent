<style>

  .c-gray rect, .c-gray ellipse { fill: #F1EFE8; stroke: #B4B2A9; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid #eeeee8; }
  .nav-btn { padding: 6px 18px; border-radius: 8px; border: 1px solid #d0cfd8; background: #f4f3ee; color: #1a1a18; font-size: 13px; cursor: pointer; font-family: inherit; }

      <!-- Headers -->

    </svg>

  <!-- Panel 2: 3 servers -->
  <div id="p2" class="panel">
    <svg width="100%" viewBox="0 0 760 360">

        <rect x="40" y="40" width="320" height="160" rx="12" stroke-width="0.5"/>

        <text class="ts" x="200" y="132" text-anchor="middle" dominant-baseline="central">— exposes AgentCard at /.well-known/</text>
        <text class="ts" x="200" y="150" text-anchor="middle" dominant-baseline="central">— receives tasks, delegates to researcher.py</text>
        <text class="ts" x="200" y="168" text-anchor="middle" dominant-baseline="central">— sends JSON result back over HTTP</text>

<script>
let cur=0,total=4;
function show(i){
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('prev').disabled=i===0;
  document.getElementById('next').disabled=i===total-1;
  document.getElementById('prog').textContent=(i+1)+' / '+total;
  cur=i;
}
function nav(d){show(Math.max(0,Math.min(total-1,cur+d)));}
</script>
